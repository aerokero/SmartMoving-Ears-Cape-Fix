name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build release archive
        shell: pwsh
        env:
          SKIP_COMPILATION: "1"
        run: python build_release.py

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SmartMoving for ModLoader.zip